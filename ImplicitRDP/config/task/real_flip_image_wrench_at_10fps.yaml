defaults:
  - real_flip_one_usb_camera_kineteach_10fps@_here_
  - _self_

name: real_flip_image_wrench_at_10fps

image_shape: [3, 360, 640]
dataset_path: data/flip_v1_zarr

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    right_robot_tcp_pose:
      shape: [9]
      type: low_dim
    right_robot_tcp_wrench:
      shape: [6]
      type: low_dim
  extended_obs: # for the AT RNN decoder of the latent diffusion policy
    right_robot_tcp_wrench:
      shape: [6]
      type: low_dim
  action:
    shape: [9] # (3+6) (x, y, z, 6d rotation)

dataset:
  _target_: ImplicitRDP.dataset.real_image_tactile_dataset.RealImageTactileDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${dataset_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${n_obs_steps}
  obs_temporal_downsample_ratio: 1
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.1
  max_train_episodes: null
  delta_action: False
  relative_action: True

