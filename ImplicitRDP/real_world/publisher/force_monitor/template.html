<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Force Sensor Real-time Monitor</title>
    <script src="/static/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        .container {
            width: 100%;
            min-height: calc(100vh - 20px);
            margin: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .control-panel {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        
        .control-panel h3 {
            margin: 0 0 15px 0;
            text-align: center;
            font-size: 1.2em;
        }
        
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .checkbox-group label, .magnitude-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .magnitude-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .baseline-control {
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
            margin-top: 15px;
        }
        
        .baseline-control h4 {
            margin: 0 0 10px 0;
            text-align: center;
            font-size: 1em;
            font-weight: normal;
        }
        
        .baseline-control input[type="number"] {
            font-size: 0.9em;
        }
        
        .baseline-control input[type="number"]:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .status-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .status-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin: 5px;
            min-width: 120px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        
        .status-value {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .status-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        #plot {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 5px;
            margin-top: 15px;
            flex: 1;
            width: 100%;
            min-height: 300px;
            height: auto;
            box-sizing: border-box;
        }
        
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 9999;
        }
        
        .connected {
            background: #4CAF50;
            color: white;
        }
        
        .disconnected {
            background: #f44336;
            color: white;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 10px;
                min-height: calc(100vh - 10px);
            }
            
            h1 {
                font-size: 1.8em;
                margin-bottom: 15px;
            }
            
            .control-panel {
                padding: 10px;
                margin-bottom: 15px;
            }
            
            .control-panel h3 {
                font-size: 1.1em;
                margin-bottom: 10px;
            }
            
            .checkbox-group, .magnitude-options {
                flex-direction: column;
                gap: 8px;
            }
            
            .checkbox-group label, .magnitude-options label {
                font-size: 0.9em;
            }
            
            .baseline-control h4 {
                font-size: 1.0em;
            }
            
            .baseline-control input[type="number"] {
                width: 60px;
                font-size: 0.9em;
                padding: 3px;
            }
            
            .baseline-control label {
                font-size: 0.9em;
            }
            
            .status-info {
                flex-direction: column;
            }
            
            .status-card {
                margin: 3px 0;
                padding: 10px;
            }
            
            #plot {
                padding: 3px;
                margin-top: 10px;
                min-height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">Connecting...</div>
    
    <div class="container">
        <h1>🤖 Bimanual Robot Force Sensor Monitor</h1>
        
        <div class="control-panel">
            <div class="axis-selection">
                <h3>Select Axes for Visualization</h3>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="force_x" checked> Force X</label>
                    <label><input type="checkbox" id="force_y" checked> Force Y</label>
                    <label><input type="checkbox" id="force_z" checked> Force Z</label>
                    <label><input type="checkbox" id="torque_x"> Torque X</label>
                    <label><input type="checkbox" id="torque_y"> Torque Y</label>
                    <label><input type="checkbox" id="torque_z"> Torque Z</label>
                </div>
                <div class="magnitude-options">
                    <label><input type="radio" name="magnitude" value="custom" checked> Custom</label>
                    <label><input type="radio" name="magnitude" value="force_only"> Force Only</label>
                    <label><input type="radio" name="magnitude" value="torque_only"> Torque Only</label>
                </div>
            </div>
            <div class="baseline-control">
                <h3>Force Baseline Setting</h3>
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <label for="baselineInput">Baseline Value:</label>
                    <input type="number" id="baselineInput" value="10.0" step="0.1" min="0" max="100" 
                            style="width: 80px; padding: 5px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.2); color: white; text-align: center;">
                    <label>
                        <input type="checkbox" id="showBaseline" checked> Show Baseline
                    </label>
                </div>
            </div>
            
        </div>

        <div class="status-info">
            <div class="status-card">
                <div class="status-value" id="leftMagnitude">0.00</div>
                <div class="status-label">Left Arm Magnitude</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="rightMagnitude">0.00</div>
                <div class="status-label">Right Arm Magnitude</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="fps">0</div>
                <div class="status-label">Update Rate (Hz)</div>
            </div>
        </div>
        
        <div id="plot"></div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;
        let x = 0;
        let maxDataPoints = 300;
        let lastUpdateTime = Date.now();
        let updateCount = 0;
        
        // Store historical wrench data for recalculation
        let historicalData = {
            x: [],
            leftWrench: [],
            rightWrench: []
        };
        
        // Initialize chart
        let leftTrace = {
            x: [], 
            y: [], 
            mode: 'lines', 
            name: 'Left Arm Wrench',
            line: {color: '#ff6b6b', width: 4}
        };
        
        let rightTrace = {
            x: [], 
            y: [], 
            mode: 'lines', 
            name: 'Right Arm Wrench',
            line: {color: '#4ecdc4', width: 4}
        };
        
        let baselineTrace = {
            x: [],
            y: [],
            mode: 'lines',
            name: 'Baseline',
            line: {color: '#ffa500', width: 4, dash: 'dash'},
            visible: true
        };
        
        // Function to calculate responsive font sizes with proper minimum values
        function getResponsiveFontSizes() {
            // Define minimum font sizes for different screen sizes
            let minTitleSize = 14;
            let minAxisTitleSize = 11;
            let minTickSize = 9;
            let minLegendSize = 10;
            
            // Increase minimum sizes for very small screens to ensure readability
            if (window.innerWidth <= 768) {
                minTitleSize = 15;
                minAxisTitleSize = 11;
                minTickSize = 9;
                minLegendSize = 10;
            }
            
            // Calculate responsive sizes with minimum value protection
            const responsiveTitle = Math.max(minTitleSize, Math.min(24, window.innerWidth / 50));
            const responsiveAxisTitle = Math.max(minAxisTitleSize, Math.min(18, window.innerWidth / 70));
            const responsiveTick = Math.max(minTickSize, Math.min(14, window.innerWidth / 90));
            const responsiveLegend = Math.max(minLegendSize, Math.min(16, window.innerWidth / 80));
            
            return {
                title: responsiveTitle,
                axisTitle: responsiveAxisTitle,
                tick: responsiveTick,
                legend: responsiveLegend
            };
        }
        
        const fontSizes = getResponsiveFontSizes();
        
        let layout = {
            title: {
                text: 'Real-time 6-DOF Wrench Data',
                font: {color: '#333', size: fontSizes.title}
            },
            xaxis: {
                title: {
                    text: 'Time Points',
                    font: {size: fontSizes.axisTitle}
                },
                tickfont: {size: fontSizes.tick},
                gridcolor: '#ddd'
            },
            yaxis: {
                title: {
                    text: 'Magnitude',
                    font: {size: fontSizes.axisTitle}
                },
                tickfont: {size: fontSizes.tick},
                gridcolor: '#ddd'
            },
            plot_bgcolor: 'rgba(255,255,255,0.8)',
            paper_bgcolor: 'rgba(255,255,255,0.9)',
            font: {color: '#333'},
            legend: {
                x: 0,
                y: 1,
                bgcolor: 'rgba(255,255,255,0.8)',
                font: {size: fontSizes.legend}
            },
            margin: {
                l: Math.max(40, Math.min(80, window.innerWidth / 30)),
                r: Math.max(15, Math.min(40, window.innerWidth / 50)),
                t: Math.max(40, Math.min(70, window.innerWidth / 25)),
                b: Math.max(40, Math.min(70, window.innerWidth / 30))
            },
            autosize: true
        };
        
        Plotly.newPlot('plot', [leftTrace, rightTrace, baselineTrace], layout, {
            responsive: true,
            displayModeBar: false,
            staticPlot: true,
            scrollZoom: false,
            doubleClick: false,
            showTips: false,
            displaylogo: false,
            editable: false,
            dragmode: false
        });

        // Function to calculate magnitude based on user selection
        function calculateMagnitude(wrench) {
            const magnitudeMode = document.querySelector('input[name="magnitude"]:checked').value;
            
            if (magnitudeMode === 'force_only') {
                return Math.sqrt(wrench[0]**2 + wrench[1]**2 + wrench[2]**2);
            } else if (magnitudeMode === 'torque_only') {
                return Math.sqrt(wrench[3]**2 + wrench[4]**2 + wrench[5]**2);
            } else { // custom selection
                let sum = 0;
                if (document.getElementById('force_x').checked) sum += wrench[0]**2;
                if (document.getElementById('force_y').checked) sum += wrench[1]**2;
                if (document.getElementById('force_z').checked) sum += wrench[2]**2;
                if (document.getElementById('torque_x').checked) sum += wrench[3]**2;
                if (document.getElementById('torque_y').checked) sum += wrench[4]**2;
                if (document.getElementById('torque_z').checked) sum += wrench[5]**2;
                return Math.sqrt(sum);
            }
        }

        // Function to update baseline
        function updateBaseline() {
            const baselineValue = parseFloat(document.getElementById('baselineInput').value) || 0;
            const showBaseline = document.getElementById('showBaseline').checked;
            
            if (showBaseline && leftTrace.x.length > 0) {
                const startX = Math.max(0, leftTrace.x[leftTrace.x.length - 1] - maxDataPoints);
                const endX = leftTrace.x[leftTrace.x.length - 1];
                
                Plotly.restyle('plot', {
                    x: [[startX, endX]],
                    y: [[baselineValue, baselineValue]],
                    visible: true
                }, [2]);
            } else {
                Plotly.restyle('plot', {
                    visible: false
                }, [2]);
            }
        }
        
        // Function to recalculate all historical data based on current visualization settings
        function recalculateHistoricalData() {
            if (historicalData.x.length === 0) return;
            
            // Recalculate magnitudes for all historical data
            const newLeftY = [];
            const newRightY = [];
            
            for (let i = 0; i < historicalData.leftWrench.length; i++) {
                const leftMagnitude = calculateMagnitude(historicalData.leftWrench[i]);
                const rightMagnitude = calculateMagnitude(historicalData.rightWrench[i]);
                newLeftY.push(leftMagnitude);
                newRightY.push(rightMagnitude);
            }
            
            // Update the traces with recalculated data
            leftTrace.x = [...historicalData.x];
            leftTrace.y = [...newLeftY];
            rightTrace.x = [...historicalData.x];
            rightTrace.y = [...newRightY];
            
            // Redraw the plot with new data
            Plotly.restyle('plot', {
                x: [historicalData.x, historicalData.x],
                y: [newLeftY, newRightY]
            }, [0, 1]);
            
            // Update current magnitude displays with latest values
            if (newLeftY.length > 0 && newRightY.length > 0) {
                document.getElementById('leftMagnitude').textContent = newLeftY[newLeftY.length - 1].toFixed(2);
                document.getElementById('rightMagnitude').textContent = newRightY[newRightY.length - 1].toFixed(2);
            }
            
            // Update baseline
            updateBaseline();
        }

        // Add event listeners for selection changes
        document.addEventListener('DOMContentLoaded', function() {
            // Add listeners to checkboxes and radio buttons
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:not(#showBaseline)');
            const radios = document.querySelectorAll('input[name="magnitude"]');
            
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    // Enable/disable checkboxes based on radio selection
                    const customSelected = document.querySelector('input[value="custom"]').checked;
                    checkboxes.forEach(cb => {
                        cb.disabled = !customSelected;
                    });
                    
                    // Recalculate historical data when checkboxes change
                    if (customSelected) {
                        recalculateHistoricalData();
                    }
                });
            });
            
            radios.forEach(radio => {
                radio.addEventListener('change', function() {
                    const customSelected = document.querySelector('input[value="custom"]').checked;
                    checkboxes.forEach(cb => {
                        cb.disabled = !customSelected;
                    });
                    
                    // Recalculate historical data when radio buttons change
                    recalculateHistoricalData();
                });
            });
            
            // Add baseline control listeners
            const baselineInput = document.getElementById('baselineInput');
            const showBaselineCheckbox = document.getElementById('showBaseline');
            
            baselineInput.addEventListener('input', updateBaseline);
            showBaselineCheckbox.addEventListener('change', updateBaseline);
            
            // Initial state
            const customSelected = document.querySelector('input[value="custom"]').checked;
            checkboxes.forEach(cb => {
                cb.disabled = !customSelected;
            });
        });
        
        // Responsive layout update with improved font size calculation
        function updateLayoutForResize() {
            // Get optimized font sizes using the unified function
            const fontSizes = getResponsiveFontSizes();
            
            // Calculate responsive margins with minimum values
            const marginLeft = Math.max(40, Math.min(80, window.innerWidth / 30));
            const marginRight = Math.max(15, Math.min(40, window.innerWidth / 50));
            const marginTop = Math.max(40, Math.min(70, window.innerWidth / 25));
            const marginBottom = Math.max(40, Math.min(70, window.innerWidth / 30));
            
            const updates = {
                'title.font.size': fontSizes.title,
                'xaxis.title.font.size': fontSizes.axisTitle,
                'xaxis.tickfont.size': fontSizes.tick,
                'yaxis.title.font.size': fontSizes.axisTitle,
                'yaxis.tickfont.size': fontSizes.tick,
                'legend.font.size': fontSizes.legend,
                'margin.l': marginLeft,
                'margin.r': marginRight,
                'margin.t': marginTop,
                'margin.b': marginBottom
            };
            Plotly.relayout('plot', updates);
        }

        // listen for window resize
        window.addEventListener('resize', function() {
            setTimeout(updateLayoutForResize, 100);
        });
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + window.location.host + '/ws');
            
            ws.onopen = function() {
                document.getElementById('connectionStatus').textContent = 'Connected';
                document.getElementById('connectionStatus').className = 'connection-status connected';
                if (reconnectInterval) {
                    clearInterval(reconnectInterval);
                    reconnectInterval = null;
                }
                
                // Reset historical data on reconnection to avoid discontinuity
                historicalData.x = [];
                historicalData.leftWrench = [];
                historicalData.rightWrench = [];
                
                // Reset x counter to avoid discontinuity
                x = 0;
                
                // Clear existing plot data and reset traces
                leftTrace.x = [];
                leftTrace.y = [];
                rightTrace.x = [];
                rightTrace.y = [];
                baselineTrace.x = [];
                baselineTrace.y = [];
                
                Plotly.restyle('plot', {
                    x: [[], [], []],
                    y: [[], [], []]
                }, [0, 1, 2]);
                
                // Reset the plot layout range
                Plotly.relayout('plot', {
                    'xaxis.range': null,
                    'yaxis.range': null
                });
                
                // Reset status displays
                document.getElementById('leftMagnitude').textContent = '0.00';
                document.getElementById('rightMagnitude').textContent = '0.00';
                document.getElementById('fps').textContent = '0';
                
                // Reset FPS counter
                lastUpdateTime = Date.now();
                updateCount = 0;
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    const leftWrench = data.left_wrench;
                    const rightWrench = data.right_wrench;
                    
                    // Store historical data for recalculation
                    historicalData.x.push(x);
                    historicalData.leftWrench.push([...leftWrench]);
                    historicalData.rightWrench.push([...rightWrench]);
                    
                    // Limit historical data to maxDataPoints
                    if (historicalData.x.length > maxDataPoints) {
                        historicalData.x.shift();
                        historicalData.leftWrench.shift();
                        historicalData.rightWrench.shift();
                    }
                    
                    // Calculate magnitudes based on user selection
                    const leftMagnitude = calculateMagnitude(leftWrench);
                    const rightMagnitude = calculateMagnitude(rightWrench);
                    
                    // Update real-time value display
                    document.getElementById('leftMagnitude').textContent = leftMagnitude.toFixed(2);
                    document.getElementById('rightMagnitude').textContent = rightMagnitude.toFixed(2);
                    
                    // Add data points to chart
                    Plotly.extendTraces('plot', {
                        x: [[x], [x]], 
                        y: [[leftMagnitude], [rightMagnitude]]
                    }, [0, 1]);
                    
                    // Update baseline
                    updateBaseline();
                    
                    // Limit number of data points displayed
                    if (leftTrace.x.length > maxDataPoints) {
                        Plotly.relayout('plot', {
                            'xaxis.range': [x - maxDataPoints, x]
                        });
                    }
                    
                    x += 1;
                    
                    // Calculate FPS
                    updateCount++;
                    const now = Date.now();
                    if (now - lastUpdateTime >= 1000) {
                        const fps = Math.round(updateCount / ((now - lastUpdateTime) / 1000));
                        document.getElementById('fps').textContent = fps;
                        lastUpdateTime = now;
                        updateCount = 0;
                    }
                    
                } catch (error) {
                    console.error('Data parsing error:', error);
                }
            };
            
            ws.onclose = function() {
                document.getElementById('connectionStatus').textContent = 'Disconnected';
                document.getElementById('connectionStatus').className = 'connection-status disconnected';
                
                // Reset FPS display when disconnected
                document.getElementById('fps').textContent = '0';
                
                // Try to reconnect after 5 seconds
                if (!reconnectInterval) {
                    reconnectInterval = setInterval(connectWebSocket, 5000);
                }
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }
        
        // Initial connection
        connectWebSocket();
        
        // Close connection when page unloads
        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
